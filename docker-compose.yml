services:
  komodo-mcp:
    build: .
    image: komodo-mcp:latest
    container_name: komodo-mcp
    restart: unless-stopped
    ports:
      - "3113:3113"
    environment:
      - KOMODO_ADDRESS=${KOMODO_ADDRESS:-http://host.docker.internal:9120}
      - KOMODO_API_KEY=${KOMODO_API_KEY}
      - KOMODO_API_SECRET=${KOMODO_API_SECRET}
      - MCP_TRANSPORT=sse
      - MCP_PORT=3113
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3113/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
